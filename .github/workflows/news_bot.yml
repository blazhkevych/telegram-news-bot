name: News Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # «живий режим»: кожні ~15 хв (GitHub може запізнюватись)
  workflow_dispatch:

permissions:
  contents: write

# Не запускати два прогони одночасно (щоб не було конфліктів git push)
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          FEEDBACK_BOT_TOKEN: ${{ secrets.FEEDBACK_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python scheduler.py

      - name: Run feedback bot
        env:
          FEEDBACK_BOT_TOKEN: ${{ secrets.FEEDBACK_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python feedback_bot.py

      - name: Run Twitter bot
        if: false   # ЗАМОРОЖЕНО: X скасував безкоштовний API (тепер pay-per-use,
                    # ~$0.20/твіт з посиланням). Див. BUGS.md БАГ-007 / issue #2.
                    # Код готовий; повернути — коли проект зароблятиме або на Bluesky.
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python twitter_bot.py

      - name: Save database
        run: |
          git config user.name  "News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add published.db feedback_offset.txt twitter.db || true
          if git diff --staged --quiet; then
            echo "БД без змін — нічого зберігати."
            exit 0
          fi
          git commit -m "update db [skip ci]"
          # ВАЖЛИВО: без pull --rebase push падає non-fast-forward щоразу, коли
          # в main з'явився чужий коміт (напр. правка коду) — і СТАН ВТРАЧАЄТЬСЯ.
          # Наступний прогін стартує зі старої БД: не знає про опубліковане
          # (→ дублі в каналі) і про SKIP (→ повторні виклики LLM → 429).
          # Саме так 15.07 бот три години не зберігав БД. Тому — retry з rebase.
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "✅ БД збережено (спроба $i)"
              exit 0
            fi
            echo "⚠️ спроба $i не вдалась — повтор"
            sleep 5
          done
          echo "❌ НЕ вдалося зберегти БД — стан втрачено, наступний прогін дублюватиме"
          exit 1
